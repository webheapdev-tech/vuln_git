<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Token Login</title>
</head>
<body>
  <h1>Token Login (No Signature Verification)</h1>
  <p>This endpoint trusts JWT-like payloads without verifying a signature.</p>
  <p><strong>Example token:</strong></p>
  <pre>{{ example_token }}</pre>

  <form method="get" action="/token-login">
    <textarea name="token" rows="4" cols="110">{{ example_token }}</textarea>
    <br>
    <button type="submit">Login with token</button>
  </form>

  <p><a href="/">Home</a></p>
</body>
</html>
