<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Save Note</title>
</head>
<body>
  <h1>Save Operational Note</h1>

  <form method="post" action="/save-note">
    <input name="name" placeholder="filename (e.g. app.log)">
    <br>
    <textarea name="content" rows="8" cols="100" placeholder="note content"></textarea>
    <br>
    <button type="submit">Save</button>
  </form>

  {% if message %}
    <p><strong>{{ message }}</strong></p>
    <p>Target path: <code>{{ target }}</code></p>
  {% endif %}

  <p><a href="/">Home</a></p>
</body>
</html>
