<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Fetch URL</title>
</head>
<body>
  <h1>Remote URL Fetcher</h1>
  <form method="get" action="/fetch">
    <input name="url" value="{{ url }}" size="80" placeholder="http://example.com">
    <button type="submit">Fetch</button>
  </form>

  <p><a href="/">Home</a></p>

  <h2>Body Preview</h2>
  <pre>{{ body }}</pre>
</body>
</html>
