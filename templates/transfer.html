<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Transfer</title>
</head>
<body>
  <h1>Money Transfer (CSRF disabled)</h1>
  {% if user %}
    <p>Logged in as {{ user.username }} with balance {{ user.balance }}</p>
  {% endif %}
  <form method="post" action="/transfer">
    <input name="to" placeholder="recipient username">
    <input name="amount" placeholder="amount">
    <button type="submit">Transfer</button>
  </form>
  <p><a href="/">Home</a></p>
</body>
</html>
