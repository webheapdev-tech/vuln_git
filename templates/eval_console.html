<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Eval Console</title>
</head>
<body>
  <h1>Debug Eval Console</h1>
  <form method="post" action="/eval">
    <textarea name="expression" rows="4" cols="100" placeholder="__import__('os').popen('id').read()">{{ expression }}</textarea>
    <br>
    <button type="submit">Run</button>
  </form>

  <h2>Result</h2>
  <pre>{{ result }}</pre>

  <p><a href="/">Home</a></p>
</body>
</html>
