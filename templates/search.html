<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>User Search</title>
</head>
<body>
  <h1>User Search (raw SQL)</h1>
  <form method="get" action="/search">
    <input name="q" value="{{ query }}" placeholder="username">
    <button type="submit">Search</button>
  </form>
  <p><a href="/">Home</a></p>

  <p><strong>Executed SQL:</strong> <code>{{ sql }}</code></p>

  <table border="1" cellpadding="6">
    <tr><th>ID</th><th>Username</th><th>Email</th><th>Role</th><th>Balance</th></tr>
    {% for r in rows %}
      <tr>
        <td>{{ r.0 }}</td>
        <td>{{ r.1 }}</td>
        <td>{{ r.2 }}</td>
        <td>{{ r.3 }}</td>
        <td>{{ r.4 }}</td>
      </tr>
    {% endfor %}
  </table>
</body>
</html>
