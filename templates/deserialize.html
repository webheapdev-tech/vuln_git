<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Deserialize Debug</title>
</head>
<body>
  <h1>Debug Deserializer</h1>
  <p>Sample pickle payload (base64):</p>
  <pre>{{ sample }}</pre>

  <form method="post" action="/deserialize">
    <textarea name="blob" rows="6" cols="100">{{ sample }}</textarea>
    <br>
    <button type="submit">Deserialize</button>
  </form>

  <p><a href="/">Home</a></p>
</body>
</html>
